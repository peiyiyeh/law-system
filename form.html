<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法案數據回填系統 - 雲端版</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --text: #3c4043; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
        .card { background: white; max-width: 600px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .info-bar { background: #e8f0fe; padding: 10px 15px; border-radius: 6px; margin-bottom: 20px; font-weight: bold; }
        .section-title { font-size: 1.1em; color: #5f6368; margin: 20px 0 10px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #1765cc; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .loading { display: none; text-align: center; margin-top: 10px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>📝 法案數據回填 (雲端同步)</h2>
    <div class="info-bar" id="display-info">正在載入法案資訊...</div>

    <div class="section-title">📊 條文與理由統計</div>
    <div class="grid">
        <div class="field"><label>條文數</label><input type="number" id="cnt_article" placeholder="0"></div>
        <div class="field"><label>理由數</label><input type="number" id="cnt_reason" placeholder="0"></div>
        <div class="field"><label>條文上傳日 (ROC)</label><input type="text" id="date_article_upload" placeholder="例如 1130520"></div>
        <div class="field"><label>理由上傳日 (ROC)</label><input type="text" id="date_reason_upload" placeholder="例如 1130521"></div>
    </div>

    <div class="section-title">🔍 進階細項統計</div>
    <div class="grid">
        <div class="field"><label>基本資料數</label><input type="number" id="cnt_basic" placeholder="0"></div>
        <div class="field"><label>修正紀錄數</label><input type="number" id="cnt_fix" placeholder="0"></div>
        <div class="field"><label>轉入沿革數</label><input type="number" id="cnt_history" placeholder="0"></div>
        <div class="field"><label>相關條文數</label><input type="number" id="cnt_rel" placeholder="0"></div>
        <div class="field"><label>編章節款數</label><input type="number" id="cnt_struct" placeholder="0"></div>
        <div class="field"><label>附件數量</label><input type="number" id="cnt_attach" placeholder="0"></div>
    </div>

    <div class="section-title">🛤️ 歷程與決議</div>
    <div class="grid">
        <div class="field"><label>歷程數量</label><input type="number" id="cnt_process" placeholder="0"></div>
        <div class="field"><label>歷程上傳日</label><input type="text" id="date_process_upload" placeholder="ROC日期"></div>
        <div class="field"><label>附帶決議數</label><input type="number" id="cnt_resolution" placeholder="0"></div>
    </div>

    <button id="submitBtn" onclick="submitToGas()">確認並送出資料</button>
    <div id="loadingMsg" class="loading">⏳ 資料傳送中，請稍候...</div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzfQ7JTJPiXuBDspO7A0sCn1JnUkuuikiX5WYhHOXW5GGy1-LGJybwf6CO_aWkKPSeO/exec"; 

    const urlParams = new URLSearchParams(window.location.search);
    const lawId = urlParams.get('id') || '未知編號';
    const lawName = urlParams.get('name') || '未知法案';
    const seq = urlParams.get('seq');

    // 💡 修改顯示名稱：案名：XXX (法編號：XXX)
    document.getElementById('display-info').innerText = `案名：${lawName} (法編號：${lawId})`;

    // 💡 在 fieldIds 陣列中新增 "cnt_resolution"
    const fieldIds = [
        "cnt_article", "cnt_basic", "cnt_fix", "cnt_history", 
        "cnt_rel", "cnt_struct", "cnt_attach", "date_article_upload", 
        "cnt_reason", "date_reason_upload", "cnt_process", "date_process_upload",
        "cnt_resolution"
    ];

    async function submitToGas() {
        if (!GAS_URL) {
            alert("錯誤：尚未設定雲端資料庫網址。");
            return;
        }

        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loadingMsg');
        
        const values = {};
    fieldIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            // 💡 關鍵修正：直接抓取 el.value 即可
            // 如果沒填，value 會是空字串 ""，GAS 就會知道「不動作」
            values[id] = el.value; 
        }
    });

        const payload = {
            seq: seq,
            id: lawId,
            lawName: lawName,
            values: values
        };

        btn.disabled = true;
        loader.style.display = 'block';

        try {
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", 
                cache: "no-cache",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

           alert("✅ 資料已傳送！本筆法案已同步至雲端，您可以關閉此分頁了。");
            
        } catch (e) {
            console.error("Error:", e);
            alert("❌ 上傳失敗，請確認網路連線或聯繫管理員。");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
